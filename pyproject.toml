[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "saaschurn"
version = "0.1.0"
description = "SaaS Churn CLI"
requires-python = ">=3.9"
dependencies = [
    "requests",
    "rich",
    "python-dotenv",
]

[project.scripts]
saaschurn = "saaschurn.cli:main"
