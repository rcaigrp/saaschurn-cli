[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "saaschurn-cli"
version = "0.1.0"
description = "SaaS Churn CLI Tool"
readme = "README.md"
authors = [{name = "Craft", email = "craft@example.com"}]
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "rich",
    "requests",
    "python-dotenv",
]

[project.scripts]
saaschurn = "saaschurn.cli:main"
