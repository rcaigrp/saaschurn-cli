[build-system]
requires = ["setuptools"]
build-backend = "setuptools"

[project]
name = "saaschurn"
version = "0.1.0"
description = "SaaS Churn CLI"
readme = "README.md"
authors = [{name = "Sprint Team"}]
dependencies = [
    "rich",
    "requests",
    "python-dotenv"
]

[tool.setuptools.packages.find]
where = ["src"]
