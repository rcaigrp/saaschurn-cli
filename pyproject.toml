[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.backends._deprecated.PEP517Backend"

[project]
name = "saaschurn"
version = "0.1.0"
description = "SaaS Churn Prediction CLI Tool"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}

[project.dependencies]
requests = "*"
rich = "*"
python-dotenv = "*"

[project.scripts]
saaschurn = "saaschurn.cli:main"

[tool.setuptools]
packages = {find = {}}
