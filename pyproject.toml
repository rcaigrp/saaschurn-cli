[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.backends._deprecated"

[project]
name = "saaschurn"
version = "0.1.0"
description = "SaaS Churn Prediction CLI Tool"
requires-python = ">=3.9"
dependencies = [
    "rich",
    "requests",
    "python-dotenv",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-mock",
    "responses",
]

[project.scripts]
saaschurn = "saaschurn.cli:main"
