[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "saaschurn"
version = "1.0.0"
description = "SaaS Churn Prediction CLI Tool"
requires-python = ">=3.9"
dependencies = [
    "rich",
    "requests",
    "python-dotenv",
]

[project.scripts]
saaschurn = "saaschurn.cli:main"
