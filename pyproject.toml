[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools"

[project]
name = "saaschurn"
version = "0.1.0"
description = "SaaS Churn CLI Tool"
requires-python = ">=3.9"
dependencies = [
    "rich",
    "requests",
    "python-dotenv",
]

[project.scripts]
saaschurn = "saaschurn.cli:main"

[tool.setuptools]
packages = ["saaschurn"]
